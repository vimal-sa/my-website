<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ParkerPuram District Sunday School</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .page-title {
            font-weight: 700;
        }

        .category-tabs {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
            padding: 10px 0;
        }

        .grade-title {
            margin-top: 40px;
            margin-bottom: 20px;
            border-left: 5px solid #0d6efd;
            padding-left: 12px;
        }

        .item-card {
            margin-bottom: 25px;
        }

        .item-header {
            background: #0d6efd;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .badge-first {
            background: #198754;
        }

        .badge-second {
            background: #0d6efd;
        }

        .badge-third {
            background: #dc3545;
        }
    </style>

</head>

<body>

    <div class="container-fluid p-4">

        <h2 class="page-title text-center mb-4">
            Sunday School Fest 2026
        </h2>

        <input class="form-control mb-4" id="searchBox" placeholder="Search participant...">

        <div id="categoryTabs" class="category-tabs nav nav-pills mb-4">
        </div>

        <div id="content"></div>

    </div>

    <script>

        const CONFIG = {

            DATA_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkGFBsNsBPE0XFepMvdt54qhchiN2rXpSppYOGJ9lbyW7WuBH7VQ63_MwnqgtUTaTVP_oUQttVNUx4/pub?gid=0&single=true&output=csv",

            CATEGORY_COLUMN: "Category",

            GRADE_COLUMN: "Grade",

            ITEM_COLUMN: "Item",

            POSITION_COLUMN: "Prize",

            SORT_COLUMN: "Prize",

            HIDE_COLUMNS: [
                "Category",
                "Grade",
                "Item"
            ],

            GRADE_ORDER: [
                "Nursery",
                "Infants",
                "Primary",
                "Sub Junior",
                "Junior",
                "Intermediate",
                "Senior",
                "Super Senior",
                "Graduation",
                "Adult",
                "Super Adult 1",
                "Super Adult 2"
            ],

            POSITION_TEXT: {
                1: "🥇 First",
                2: "🥈 Second",
                3: "🥉 Third"
            }

        };

        let headers = [];

        let rows = [];

        let groupedData = {};

        let currentCategory = "";

        function getColumnIndex(name) {
            return headers.indexOf(name);
        }

        function getValue(row, column) {
            return row[getColumnIndex(column)];
        }

        function sortByPosition(list) {

            list.sort((a, b) => {

                return Number(
                    getValue(a, CONFIG.SORT_COLUMN)
                ) -
                    Number(
                        getValue(b, CONFIG.SORT_COLUMN)
                    );

            });

        }

        async function loadData() {

            const response = await fetch(CONFIG.DATA_URL);

            const csv = await response.text();

            const data = parseCSV(csv);

            headers = data[0];

            rows = data.slice(1);

            buildDataTree();

            renderTabs();

        }

        function parseCSV(text) {

            const result = [];

            let row = [];

            let value = "";

            let insideQuote = false;

            for (let i = 0; i < text.length; i++) {

                const c = text[i];

                if (c == '"') {

                    if (insideQuote && text[i + 1] == '"') {
                        value += '"';
                        i++;
                    }
                    else {
                        insideQuote = !insideQuote;
                    }

                    continue;
                }

                if (c == ',' && !insideQuote) {

                    row.push(value.trim());

                    value = "";

                    continue;

                }

                if ((c == '\n' || c == '\r') && !insideQuote) {

                    if (c == '\r')
                        continue;

                    row.push(value.trim());

                    result.push(row);

                    row = [];

                    value = "";

                    continue;

                }

                value += c;

            }

            if (value.length || row.length) {

                row.push(value.trim());

                result.push(row);

            }

            return result;

        }

        function buildDataTree() {

            groupedData = {};

            rows.forEach(row => {

                const category = getValue(row, CONFIG.CATEGORY_COLUMN);

                const grade = getValue(row, CONFIG.GRADE_COLUMN);

                const item = getValue(row, CONFIG.ITEM_COLUMN);

                if (!groupedData[category])
                    groupedData[category] = {};

                if (!groupedData[category][grade])
                    groupedData[category][grade] = {};

                if (!groupedData[category][grade][item])
                    groupedData[category][grade][item] = [];

                groupedData[category][grade][item].push(row);

            });

            Object.values(groupedData).forEach(grades => {

                Object.values(grades).forEach(items => {

                    Object.values(items).forEach(list => {

                        sortByPosition(list);

                    });

                });

            });

        }

        function renderTabs() {

            const tabs = document.getElementById("categoryTabs");

            tabs.innerHTML = "";

            const categories = Object.keys(groupedData).sort();

            categories.forEach((category, index) => {

                const button = document.createElement("button");

                button.className = "nav-link";

                button.innerHTML = category;

                if (index == 0) {

                    button.classList.add("active");

                    currentCategory = category;

                }

                button.onclick = function () {

                    document
                        .querySelectorAll("#categoryTabs .nav-link")
                        .forEach(x => x.classList.remove("active"));

                    this.classList.add("active");

                    currentCategory = category;

                    renderCategory();

                };

                tabs.appendChild(button);

            });

            renderCategory();

        }

        function renderCategory() {

            const content = document.getElementById("content");

            content.innerHTML = "";

            const grades = groupedData[currentCategory];

            CONFIG.GRADE_ORDER.forEach(grade => {

                if (!grades[grade])
                    return;

                renderGrade(content, grade, grades[grade]);

            });

        }

        function renderGrade(parent, gradeName, items) {

            const gradeHeading = document.createElement("h3");

            gradeHeading.className = "grade-title";

            gradeHeading.innerHTML = gradeName;

            parent.appendChild(gradeHeading);

            Object.keys(items)
                .sort()
                .forEach(itemName => {

                    renderItem(parent, itemName, items[itemName]);

                });

        }

        function renderItem(parent, itemName, participants) {

            const card = document.createElement("div");
            card.className = "card item-card shadow-sm";

            const header = document.createElement("div");
            header.className = "item-header d-flex justify-content-between align-items-center";

            header.innerHTML = `
        <span>${itemName}</span>
        <span class="badge bg-light text-dark">
            ${participants.length} Participant${participants.length > 1 ? "s" : ""}
        </span>
    `;

            card.appendChild(header);

            const body = document.createElement("div");
            body.className = "card-body p-0";

            body.appendChild(createTable(participants));

            card.appendChild(body);

            parent.appendChild(card);

        }

        function createTable(participants) {

            const table = document.createElement("table");

            table.className = "table table-bordered table-hover table-striped mb-0";

            const thead = document.createElement("thead");

            const tbody = document.createElement("tbody");

            //-----------------------------------
            // HEADER
            //-----------------------------------

            const tr = document.createElement("tr");

            headers.forEach(column => {

                if (CONFIG.HIDE_COLUMNS.includes(column))
                    return;

                const th = document.createElement("th");

                th.innerHTML = column;

                tr.appendChild(th);

            });

            thead.appendChild(tr);

            //-----------------------------------
            // ROWS
            //-----------------------------------

            participants.forEach(row => {

                const tr = document.createElement("tr");

                headers.forEach((column, index) => {

                    if (CONFIG.HIDE_COLUMNS.includes(column))
                        return;

                    let value = row[index];

                    if (column === CONFIG.POSITION_COLUMN) {

                        value = CONFIG.POSITION_TEXT[value] || value;

                    }

                    const td = document.createElement("td");

                    td.innerHTML = value;

                    tr.appendChild(td);

                });

                tbody.appendChild(tr);

            });

            table.appendChild(thead);

            table.appendChild(tbody);

            return table;

        }

        document
            .getElementById("searchBox")
            .addEventListener("keyup", function () {

                const keyword = this.value.toLowerCase();

                document
                    .querySelectorAll(".item-card")
                    .forEach(card => {

                        const rows = card.querySelectorAll("tbody tr");

                        let visibleRows = 0;

                        rows.forEach(row => {

                            const show = row.innerText
                                .toLowerCase()
                                .includes(keyword);

                            row.style.display = show ? "" : "none";

                            if (show)
                                visibleRows++;

                        });

                        card.style.display =
                            visibleRows > 0 ? "" : "none";

                    });

            });

        loadData();

    </script>

</body>

</html>
