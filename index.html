<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Sheet Data</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        margin: 20px;
        background: #f4f4f4;
    }

    h2 {
        text-align: center;
    }

    #searchBox {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 16px;
    }

    .table-container {
        overflow-x: auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 800px;
    }

    th {
        background: #1976d2;
        color: white;
        position: sticky;
        top: 0;
    }

    th, td {
        padding: 10px;
        border: 1px solid #ddd;
        text-align: left;
        white-space: nowrap;
    }

    tr:nth-child(even) {
        background: #f9f9f9;
    }

    tr:hover {
        background: #eef6ff;
    }

    .loading {
        text-align: center;
        padding: 20px;
        font-size: 18px;
    }
</style>

</head>
<body>

<h2>Competition Data</h2>

<input
    type="text"
    id="searchBox"
    placeholder="Search..."
>

<div class="table-container">
    <table id="sheetTable">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<div id="status" class="loading">Loading...</div>

<script>

const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQkGFBsNsBPE0XFepMvdt54qhchiN2rXpSppYOGJ9lbyW7WuBH7VQ63_MwnqgtUTaTVP_oUQttVNUx4/pub?gid=0&single=true&output=csv";

async function loadSheet(){

    const response = await fetch(csvUrl);
    const csv = await response.text();

    const rows = parseCSV(csv);

    renderTable(rows);

    document.getElementById("status").style.display="none";
}

function parseCSV(text){

    const rows = [];
    const pattern = /(?:,|\n|^)(?:"([^"]*(?:""[^"]*)*)"|([^",\n]*))/g;

    let row = [];
    let match;

    while ((match = pattern.exec(text)) !== null) {

        if (match[0].startsWith("\n")) {
            rows.push(row);
            row = [];
        }

        row.push(
            (match[1] || match[2] || "")
                .replace(/""/g,'"')
                .trim()
        );
    }

    if (row.length) rows.push(row);

    return rows;
}

function renderTable(data){

    if(data.length===0) return;

    const table=document.getElementById("sheetTable");

    const thead=table.querySelector("thead");
    const tbody=table.querySelector("tbody");

    thead.innerHTML="";
    tbody.innerHTML="";

    const headerRow=document.createElement("tr");

    data[0].forEach(col=>{
        const th=document.createElement("th");
        th.textContent=col;
        headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);

    for(let i=1;i<data.length;i++){

        const tr=document.createElement("tr");

        data[i].forEach(cell=>{

            const td=document.createElement("td");
            td.textContent=cell;
            tr.appendChild(td);

        });

        tbody.appendChild(tr);

    }
}

document.getElementById("searchBox").addEventListener("keyup",function(){

    const value=this.value.toLowerCase();

    document.querySelectorAll("#sheetTable tbody tr").forEach(row=>{

        row.style.display=row.innerText.toLowerCase().includes(value)
            ? ""
            : "none";

    });

});

loadSheet();

</script>

</body>
</html>
